# CI/CDパイプラインに組み込む例：
name: Generate SBOM
on:
  push:
    branches: ["main"]
jobs:
  sbom-upload:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate and upload SBOM
        uses: advanced-security/spdx-dependency-submission-action@v0.0.1
